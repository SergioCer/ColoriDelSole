<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colori del Sole - Video</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffb347, #ffcc33, #ff7e5f);
      text-align: center;
      color: #2b2b2b;
    }

    h1 {
      margin-top: 50px;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .box {
      background: rgba(255,255,255,0.95);
      max-width: 850px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .note {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    video {
      width: 100%;
      max-width: 750px;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      display: block;
      margin: 0 auto 20px auto;
      background: black;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #ff7e5f;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .placeholder {
      margin-top: 20px;
      padding: 30px;
      border: 2px dashed #ff7e5f;
      border-radius: 15px;
      color: #777;
      background: #fff;
    }
  </style>
</head>

<body>

  <h1>🎥 I nostri Video</h1>

  <div class="box">

    <p class="note">
      Questa sezione è in aggiornamento.<br>
      Ecco una nostra prima esibizione 🎶
    </p>

    <!-- 🎬 VIDEO -->
    <video controls>
      <source src="./abballati.mp4" type="video/mp4">
      Il tuo browser non supporta il video.
    </video>

    <div class="placeholder">
      🎬 Altri video in arrivo...
    </div>

    <a href="index.html">⬅️ Torna alla Home</a>

  </div>

</body>
</html>
