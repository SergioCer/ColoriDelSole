  <!-- 📖 descrizione -->
  <h2>📖 Descrizione</h2>
  <div class="card">
    Questa canzone fa parte di una importante raccolta di musiche popolari, pare sia stata
    appresa dall’esecuzione di alcune donne palermitane in un cortile.
    <br>
    La si cantava nelle feste di lavoro, dopo la raccolta del grano, delle olive,
    ma anche nelle feste paesane e nei momenti di ballo durante i matrimoni
    poichè ben si accoppia con la danza.
    <br>
    Le parole sono allegre e scanzonate, le donne, ammiccando verso gli uomini, li
    incitano al ballo e lo stesso fanno gli uomini. 
    <br>
    La versione che ascolterete è stata elaborata per coro a due voci.
  </div>
