<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colori del Sole - Eventi</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffb347, #ffcc33, #ff7e5f);
            color: #2b2b2b;
            text-align: center;
        }

        h1 {
            margin-top: 50px;
            color: white;
        }

        .content {
            background: rgba(255,255,255,0.95);
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .event {
            margin-bottom: 25px;
            font-size: 18px;
            line-height: 1.5;
        }

        .event a {
            color: #ff7e5f;
            text-decoration: none;
            font-weight: bold;
        }

        .event a:hover {
            text-decoration: underline;
        }

        /* 🔘 pulsante */
        .buttons {
            margin-top: 30px;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 12px auto;
            padding: 15px;
            font-size: 18px;
            color: white;
            background: #4CAF50;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #3e8e41;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

    <h1>🎶 Nostre partecipazioni</h1>

    <div class="content">


        <div class="event">
            11-15 Giugno 2025 — 28° Festival dei Mille Cori<br>
            <a href="https://festivalpusteria.org" target="_blank">
                Visita il sito ufficiale
            </a>
        </div>

        <div class="event">
            1-31 Maggio 2026 — BIF Brighton Italian Festival<br>
            <a href="https://brightonitalianfestival.com" target="_blank">
                Visita il sito ufficiale
            </a>
        </div>

        <div class="buttons">
            <a href="index.html" class="btn">
                ⬅️ Torna alla Home
            </a>
        </div>

    </div>

</body>
</html>
