<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Eventi</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .event-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      transition: 0.3s;
      cursor: pointer;
      text-align: left;
    }
    .event-card:hover {
      transform: scale(1.03);
    }
    .event-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .event-content {
      padding: 15px;
    }
    .event-content h3 {
      margin: 0 0 10px 0;
      color: #ff7e5f;
    }
    .event-content p {
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>

<body>
<h1>📸 Album Eventi</h1>
<div class="container">
  <div id="gallery" class="gallery"></div>
  <a class="btn" href="../index.html">🏠 Torna alla Home</a>
</div>

<script>
fetch("data/eventi.json")
  .then(res => res.json())
  .then(data => {
    const gallery = document.getElementById("gallery");
    data.forEach(evento => {
      const card = document.createElement("div");
      card.className = "event-card";
      card.innerHTML = `
        <img src="${evento.cover}" alt="${evento.titolo}">
        <div class="event-content">
          <h3>${evento.titolo}</h3>
          <p>${evento.descrizione || ""}</p>
        </div>
      `;
      card.onclick = () => {
        window.location.href = `evento.html?id=${evento.id}`;
      };
      gallery.appendChild(card);
    });
  });
</script>
</body>
</html>
