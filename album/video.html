<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Evento</title>
<link rel="stylesheet" href="../styles.css">

<style>
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 30px;
  }

  .video-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .video-card video {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    display: block;
  }

  .video-card:hover {
    transform: scale(1.03);
  }

  .caption {
    padding: 10px;
    font-size: 14px;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
  }

  .lightbox video {
    max-width: 90%;
    max-height: 70%;
    border-radius: 10px;
  }

  .lightbox p {
    color: white;
    margin-top: 10px;
  }

  .controls {
    margin-top: 15px;
  }

  .controls button {
    margin: 0 10px;
    padding: 10px 15px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>
<h1 id="titolo">Video Evento</h1>
<div class="container">
  <div id="gallery" class="gallery"></div>
  <a class="btn-back" href="index.html">⬅️ Torna agli eventi</a>
</div>
<a class="btn" href="../index.html">🏠 Home</a>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <video id="lightbox-video" controls></video>
  <p id="lightbox-caption"></p>

  <div class="controls">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
    <button onclick="closeLightbox()">❌</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let videoData = [];
let current = 0;

fetch(`data/${id}.json`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("titolo").textContent = data.titolo;

    const gallery = document.getElementById("gallery");
    videoData = data.video || [];

    videoData.forEach((v, index) => {
      const div = document.createElement("div");
      div.className = "video-card";
      div.innerHTML = `
        <video src="${v.src}" preload="metadata"></video>
        ${v.caption ? `<div class="caption">${v.caption}</div>` : ""}
      `;
      div.onclick = () => openLightbox(index);
      gallery.appendChild(div);
    });
  });

function openLightbox(index) {
  current = index;
  document.getElementById("lightbox").style.display = "flex";
  updateLightbox();
}

function closeLightbox() {
  const video = document.getElementById("lightbox-video");
  video.pause();
  document.getElementById("lightbox").style.display = "none";
}

function updateLightbox() {
  const video = document.getElementById("lightbox-video");
  video.src = videoData[current].src;
  video.play();
  document.getElementById("lightbox-caption").textContent = videoData[current].caption || "";
}

function next() {
  current = (current + 1) % videoData.length;
  updateLightbox();
}

function prev() {
  current = (current - 1 + videoData.length) % videoData.length;
  updateLightbox();
}
</script>
</body>
</html>
